<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRACO PACK | Login Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 w-full max-w-md text-center">
        <img src="logocentral2.png" alt="GRACO PACK" class="h-12 mx-auto mb-6">
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Panel B2B</h2>
        <p class="text-slate-500 text-sm mb-8">Ingresa tus credenciales para administrar el catálogo.</p>
        
        <form id="loginForm" class="space-y-5 text-left">
            <div id="step1">
                <div class="mb-5">
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Usuario</label>
                    <input type="text" id="username" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-green-600 focus:ring-1 focus:ring-green-600 outline-none transition-all" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Contraseña</label>
                    <input type="password" id="password" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-green-600 focus:ring-1 focus:ring-green-600 outline-none transition-all" required>
                </div>
            </div>

            <div id="step2" class="hidden animate-pulse">
                <div class="bg-blue-50 p-4 rounded-xl mb-6 flex items-center gap-3 border border-blue-100">
                    <i class="fa-solid fa-shield-halved text-blue-500"></i>
                    <p class="text-[11px] text-blue-700 leading-tight">2FA Activo: Abre tu app de autenticación y escribe el código de 6 dígitos.</p>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Código de Seguridad (2FA)</label>
                    <input type="text" id="2faToken" placeholder="000000" maxlength="6" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-center text-xl font-bold tracking-[0.5em] focus:border-blue-600 outline-none transition-all">
                </div>
            </div>

            <p id="errorMsg" class="text-red-500 text-xs hidden">Credenciales inválidas.</p>
            <button type="submit" id="loginBtn" class="w-full bg-[#0F4C81] text-white font-semibold rounded-xl px-4 py-3 hover:bg-[#0d416b] transition-colors shadow-md">Iniciar Sesión</button>
        </form>
    </div>

    <script>
        let is2FARequired = false;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const token = document.getElementById('2faToken').value;
            
            if (!is2FARequired) {
                // Paso 1: Login normal
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                const data = await res.json();
                if (data.success) {
                    if (data.status === "2FA_REQUIRED") {
                        is2FARequired = true;
                        document.getElementById('step1').classList.add('hidden');
                        document.getElementById('step2').classList.remove('hidden');
                        document.getElementById('step2').classList.remove('animate-pulse');
                        document.getElementById('loginBtn').innerText = 'Verificar Código';
                        document.getElementById('errorMsg').classList.add('hidden');
                    } else {
                        const urlParams = new URLSearchParams(window.location.search);
                        const redirectUrl = urlParams.get('redirect') || '/';
                        window.location.href = redirectUrl;
                    }
                } else {
                    document.getElementById('errorMsg').innerText = data.message || 'Credenciales inválidas.';
                    document.getElementById('errorMsg').classList.remove('hidden');
                }
            } else {
                // Paso 2: Validar 2FA
                const res = await fetch('/admin/2fa/login-validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, token: token })
                });

                const data = await res.json();
                if (data.success) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectUrl = urlParams.get('redirect') || '/';
                    window.location.href = redirectUrl;
                } else {
                    document.getElementById('errorMsg').innerText = 'Código 2FA incorrecto.';
                    document.getElementById('errorMsg').classList.remove('hidden');
                }
            }
        });
    </script>
</body>
</html>
