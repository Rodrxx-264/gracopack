<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRACO PACK | Administrador de Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800">

    <header class="bg-[#0F4C81] text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="logocentral2.png" alt="Logo" class="h-8 brightness-0 invert">
                <span class="font-bold border-l border-white/20 pl-4">Dashboard</span>
            </div>
            <div class="flex gap-4 items-center">
                <div id="2faStatus" class="text-[10px] px-2 py-1 rounded-full font-bold uppercase tracking-wider"></div>
                <button onclick="open2FASetup()"
                    class="text-sm font-medium hover:text-green-400 transition-colors">Configurar 2FA</button>
                <button onclick="openUserModal()"
                    class="text-sm font-medium hover:text-blue-400 transition-colors">Nuevo Usuario</button>
                <a href="/inicio.html" target="_blank"
                    class="text-sm font-medium hover:text-green-400 transition-colors">Ver Sitio</a>
                <button onclick="logout()"
                    class="text-sm font-medium text-red-300 hover:text-red-400 transition-colors">Cerrar Sesión</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- FORMULARIO NUEVO PRODUCTO -->
        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 sticky top-24">
                <h2 class="text-lg font-bold text-[#0F4C81] mb-6 border-b pb-2"><i
                        class="fa-solid fa-plus-circle mr-2"></i>Agregar Producto</h2>

                <form id="productForm" class="space-y-4 text-sm">

                    <div class="grid grid-cols-3 gap-4">
                        <div class="col-span-3 lg:col-span-1">
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Código</label>
                            <input type="text" name="codigo" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 focus:border-green-600 outline-none"
                                placeholder="Ej. GP-001">
                        </div>
                        <div class="col-span-3 lg:col-span-1">
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Nombre (ES)</label>
                            <input type="text" name="nombre_es" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 focus:border-green-600 outline-none">
                        </div>
                        <div class="col-span-3 lg:col-span-1">
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Nombre (EN)</label>
                            <input type="text" name="nombre_en" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 focus:border-green-600 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Descripción (ES)</label>
                            <textarea name="descripcion_es"
                                class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 focus:border-green-600 outline-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Descripción (EN)</label>
                            <textarea name="descripcion_en"
                                class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 focus:border-green-600 outline-none"></textarea>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Dimensión</label>
                            <input type="text" name="dimension" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 focus:border-green-600 outline-none"
                                placeholder="Ej. 10x15 cm">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Unidad de Empaque</label>
                            <input type="text" name="unidad_empaque" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 focus:border-green-600 outline-none"
                                placeholder="Ej. 500 uds/caja">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Categoría</label>
                        <select name="categoria"
                            class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 focus:border-green-600 outline-none">
                            <option value="Empaques Foam Bio">Empaques Foam Bio</option>
                            <option value="Ecológico GP">Ecológico GP</option>
                            <option value="Deli Sello de Seguridad">Deli Sello de Seguridad</option>
                            <option value="Deli Containers">Deli Containers</option>
                            <option value="Domos Pasteleros CP">Domos Pasteleros CP</option>
                            <option value="Domos Pasteleros SCI">Domos Pasteleros SCI</option>
                            <option value="Bandejas Abisagradas">Bandejas Abisagradas</option>
                            <option value="Clamshells">Clamshells</option>
                            <option value="Ensaladeras">Ensaladeras</option>
                            <option value="Bandejas para Helado">Bandejas para Helado</option>
                            <option value="Bandejas para Huevos">Bandejas para Huevos</option>
                            <option value="Otras Bandejas">Otras Bandejas</option>
                            <option value="Platos Desechables">Platos Desechables</option>
                            <option value="Vasos de Polipapel">Vasos de Polipapel</option>
                            <option value="Vasos Multiusos">Vasos Multiusos</option>
                            <option value="Vasos Impresos">Vasos Impresos</option>
                            <option value="Tapas para Vasos">Tapas para Vasos</option>
                            <option value="Cubiertos Desechables">Cubiertos Desechables</option>
                            <option value="Pajillas">Pajillas</option>
                        </select>
                    </div>

                    <div>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="isEco" value="true"
                                class="w-4 h-4 text-green-600 rounded border-gray-300 focus:ring-green-500">
                            <span class="text-xs font-semibold text-slate-500">Es producto Ecológico (Eco Line)</span>
                        </label>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Imagen (Archivo Local o
                            Cloudinary)</label>
                        <input type="file" id="product-image-input" name="imagen" accept="image/*" required
                            class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                    </div>

                    <input type="hidden" id="editProductId" name="id">
                    <button type="submit" id="submitBtn"
                        class="w-full bg-[#16A34A] text-white font-semibold py-3 rounded-xl hover:bg-green-700 transition shadow-sm mt-4 flex justify-center items-center gap-2">
                        <i class="fa-solid fa-save"></i> <span>Guardar Producto</span>
                    </button>
                    <button type="button" id="cancelEditBtn" onclick="cancelEdit()"
                        class="w-full bg-slate-200 text-slate-600 font-semibold py-2 rounded-xl hover:bg-slate-300 transition mt-2 hidden text-xs">
                        Cancelar Edición
                    </button>
                </form>
            </div>
        </div>

        <!-- LISTA DE PRODUCTOS -->
        <div class="lg:col-span-2">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-bold text-[#0F4C81] mb-6 border-b pb-2"><i
                        class="fa-solid fa-boxes-stacked mr-2"></i>Productos Actuales</h2>

                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-slate-600">
                        <thead class="bg-slate-50 text-xs uppercase font-semibold text-slate-500">
                            <tr>
                                <th class="px-4 py-3 rounded-tl-xl">Imagen</th>
                                <th class="px-4 py-3">Nombre</th>
                                <th class="px-4 py-3">Categoría</th>
                                <th class="px-4 py-3 text-right rounded-tr-xl">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody" class="divide-y divide-slate-100">
                            <!-- JS renderiza aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- 2FA SETUP MODAL -->
    <div id="modal2FA"
        class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 relative">
            <button onclick="close2FAModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i
                    class="fa-solid fa-times"></i></button>

            <h2 class="text-xl font-bold text-[#0F4C81] mb-2 text-center">Configurar 2FA</h2>
            <p class="text-sm text-slate-500 mb-6 text-center">Escanea el código QR con Google Authenticator o Authy.
            </p>

            <div class="flex justify-center mb-6">
                <img id="qrCodeImg" src="" class="border p-2 rounded-xl bg-white shadow-sm h-48 w-48">
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Código de Verificación</label>
                    <input type="text" id="2faToken" placeholder="000000"
                        class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-center text-lg font-bold tracking-[0.5em] outline-none focus:border-green-600">
                </div>
                <button onclick="verifyAndActivate2FA()"
                    class="w-full bg-[#16A34A] text-white font-semibold py-3 rounded-xl hover:bg-green-700 transition shadow-sm">Activar
                    2FA Ahora</button>
            </div>
        </div>
    </div>

    <!-- USER CREATION MODAL -->
    <div id="modalUser"
        class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 relative">
            <button onclick="closeUserModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i
                    class="fa-solid fa-times"></i></button>

            <h2 class="text-xl font-bold text-[#0F4C81] mb-6 border-b pb-2">Crear Nuevo Usuario</h2>

            <form id="userForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Nombre / Usuario</label>
                    <input type="text" id="newUsername" required
                        class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 outline-none focus:border-blue-600">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Contraseña</label>
                    <input type="password" id="newUserPass" required
                        class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 outline-none focus:border-blue-600">
                </div>
                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="newUser2FA" class="w-4 h-4 text-blue-600 rounded">
                    <label for="newUser2FA" class="text-sm text-slate-600">Activar 2FA automáticamente</label>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Imagen de Perfil (Cloudinary)</label>
                    <input type="file" id="admin-image-input" accept="image/*"
                        class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                <button type="submit"
                    class="w-full bg-[#0F4C81] text-white font-semibold py-3 rounded-xl hover:bg-slate-800 transition shadow-sm">Crear
                    Usuario</button>
            </form>

            <div id="userQRSection" class="hidden mt-8 pt-8 border-t border-slate-100 text-center">
                <p class="text-xs font-bold text-green-600 mb-4 uppercase tracking-wider">¡Éxito! Escanea este código
                    QR:</p>
                <div class="flex justify-center mb-4">
                    <img id="userQRCodeImg" src="" class="border p-2 rounded-xl bg-white shadow-sm h-40 w-40">
                </div>
                <p class="text-[10px] text-slate-400">Guarda este QR o muéstralo al usuario para que lo configure en su
                    app.</p>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN CLOUDINARY
        const CLOUD_NAME = 'TU_CLOUD_NAME'; // Cambia por tu Cloud Name
        const UPLOAD_PRESET = 'TU_UPLOAD_PRESET'; // Cambia por tu Unsigned Upload Preset

        // Función genérica para subir a Cloudinary
        async function uploadToCloudinary(fileInputId) {
            const fileInput = document.getElementById(fileInputId);
            if (!fileInput || !fileInput.files[0]) return null;

            if (CLOUD_NAME === 'TU_CLOUD_NAME') {
                console.warn('Cloudinary no configurado. Usando carga local si es posible.');
                return null;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('upload_preset', UPLOAD_PRESET);
            formData.append('folder', 'graco/imagenes');

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                return data.secure_url;
            } catch (err) {
                console.error('Error subiendo a Cloudinary:', err);
                return null;
            }
        }

        // User Functions
        function openUserModal() {
            document.getElementById('userQRSection').classList.add('hidden');
            document.getElementById('userForm').reset();
            document.getElementById('modalUser').classList.remove('hidden');
            document.getElementById('modalUser').classList.add('flex');
        }

        function closeUserModal() {
            document.getElementById('modalUser').classList.add('hidden');
            document.getElementById('modalUser').classList.remove('flex');
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombre = document.getElementById('newUsername').value;
            const password = document.getElementById('newUserPass').value;
            const enable2FA = document.getElementById('newUser2FA').checked;

            // 1. Subir imagen a Cloudinary
            const imageUrl = await uploadToCloudinary('admin-image-input');

            // 2. Enviar datos al backend
            const res = await fetch('/admin/usuarios/crear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, password, enable2FA, imageUrl })
            });

            const data = await res.json();
            if (data.success) {
                if (data.qrCodeUrl) {
                    document.getElementById('userQRCodeImg').src = data.qrCodeUrl;
                    document.getElementById('userQRSection').classList.remove('hidden');
                } else {
                    alert('Usuario creado correctamente (sin 2FA)');
                    closeUserModal();
                }
            } else {
                alert('Error: ' + data.message);
            }
        });

        // 2FA Functions
        async function open2FASetup() {
            const res = await fetch('/admin/2fa/setup');
            const data = await res.json();
            document.getElementById('qrCodeImg').src = data.qrCodeUrl;
            document.getElementById('modal2FA').classList.remove('hidden');
            document.getElementById('modal2FA').classList.add('flex');
        }

        function close2FAModal() {
            document.getElementById('modal2FA').classList.add('hidden');
            document.getElementById('modal2FA').classList.remove('flex');
        }

        async function verifyAndActivate2FA() {
            const token = document.getElementById('2faToken').value;
            const res = await fetch('/admin/2fa/verify-and-activate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const data = await res.json();
            if (data.success) {
                alert('¡2FA activado correctamente!');
                location.reload();
            } else {
                alert('Código inválido, intenta de nuevo.');
            }
        }

        // Cargar productos
        let allProducts = [];
        async function loadProducts() {
            const resData = await fetch('/api/products'); 
            if (resData.status === 401) {
                // Si no hay sesión, vamos al login pero guardamos la URL actual para volver
                const currentUrl = window.location.pathname + window.location.search;
                window.location.href = '/login?redirect=' + encodeURIComponent(currentUrl);
                return;
            }

            allProducts = await resData.json();
            
            // Ordenar por código
            allProducts.sort((a, b) => {
                if (!a.codigo) return 1;
                if (!b.codigo) return -1;
                return a.codigo.localeCompare(b.codigo, undefined, { numeric: true, sensitivity: 'base' });
            });

            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '';

            allProducts.forEach(p => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-3"><img src="${p.imagen}" class="h-12 w-12 object-contain bg-white rounded border"></td>
                        <td class="px-4 py-3 font-medium text-slate-800">
                            <span class="text-xs font-bold text-slate-400 block">${p.codigo || 'S/N'}</span>
                            ${p.nombre_es} 
                            <br><span class="text-xs font-light text-slate-400">${p.dimension || ''} | ${p.unidad_empaque || ''}</span>
                        </td>
                        <td class="px-4 py-3 text-xs"><span class="bg-slate-100 px-2 py-1 rounded text-slate-500">${p.categoria}</span></td>
                        <td class="px-4 py-3 text-right whitespace-nowrap">
                            <button onclick="editProduct('${p.id}')" class="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors mr-2">
                                <i class="fa-solid fa-edit"></i>
                            </button>
                            <button onclick="deleteProduct('${p.id}')" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-colors">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        // Editar producto
        function editProduct(id) {
            const p = allProducts.find(prod => prod.id === id);
            if (!p) return;

            const form = document.getElementById('productForm');
            form.querySelector('[name="codigo"]').value = p.codigo || '';
            form.querySelector('[name="nombre_es"]').value = p.nombre_es || '';
            form.querySelector('[name="nombre_en"]').value = p.nombre_en || '';
            form.querySelector('[name="descripcion_es"]').value = p.descripcion_es || '';
            form.querySelector('[name="descripcion_en"]').value = p.descripcion_en || '';
            form.querySelector('[name="dimension"]').value = p.dimension || '';
            form.querySelector('[name="unidad_empaque"]').value = p.unidad_empaque || '';
            form.querySelector('[name="categoria"]').value = p.categoria || '';
            form.querySelector('[name="isEco"]').checked = p.isEco || false;
            document.getElementById('editProductId').value = p.id;

            // Quitar el 'required' de la imagen al editar
            document.getElementById('product-image-input').required = false;

            document.getElementById('submitBtn').querySelector('span').innerText = 'Actualizar Producto';
            document.getElementById('submitBtn').classList.replace('bg-[#16A34A]', 'bg-blue-600');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            
            form.scrollIntoView({ behavior: 'smooth' });
        }

        function cancelEdit() {
            const form = document.getElementById('productForm');
            form.reset();
            document.getElementById('editProductId').value = '';
            document.getElementById('product-image-input').required = true;
            document.getElementById('submitBtn').querySelector('span').innerText = 'Guardar Producto';
            document.getElementById('submitBtn').classList.replace('bg-blue-600', 'bg-[#16A34A]');
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        // Agregar producto
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const editId = document.getElementById('editProductId').value;

            const btn = form.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando y Subiendo...';
            btn.disabled = true;

            // 1. Intentar subir a Cloudinary primero (solo si hay archivo seleccionado)
            let cloudinaryUrl = null;
            if (document.getElementById('product-image-input').files.length > 0) {
                cloudinaryUrl = await uploadToCloudinary('product-image-input');
            }
            
            let res;
            const method = editId ? 'PUT' : 'POST';
            const url = editId ? `/api/products/${editId}` : '/api/products';

            if (cloudinaryUrl) {
                const data = {};
                formData.forEach((value, key) => { if(key !== 'imagen') data[key] = value; });
                data.imagen_url = cloudinaryUrl;

                res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } else {
                // Si estamos editando y no subimos imagen nueva, enviamos los datos actuales
                if (editId && document.getElementById('product-image-input').files.length === 0) {
                    const data = {};
                    formData.forEach((value, key) => { if(key !== 'imagen') data[key] = value; });
                    res = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    res = await fetch(url, {
                        method: method,
                        body: formData
                    });
                }
            }

            if (res.ok) {
                cancelEdit();
                loadProducts();
            } else {
                const errData = await res.json();
                alert('Error: ' + (errData.error || 'No se pudo guardar el producto'));
            }

            btn.innerHTML = editId ? '<i class="fa-solid fa-save"></i> <span>Actualizar Producto</span>' : '<i class="fa-solid fa-save"></i> <span>Guardar Producto</span>';
            btn.disabled = false;
        });

        // Eliminar producto
        async function deleteProduct(id) {
            if (confirm('¿Estás seguro de eliminar este producto?')) {
                await fetch(`/api/products/${id}`, { method: 'DELETE' });
                loadProducts();
            }
        }

        // Logout
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            // Al cerrar sesión, volvemos al inicio o al login sin la clave
            window.location.href = '/inicio.html';
        }

        // Iniciar
        loadProducts();
    </script>
</body>

</html>
